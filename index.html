<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Dust - Spherical Terrain Manipulation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
        }

        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 5px;
        }

        button {
            display: block;
            width: 100%;
            margin: 5px 0;
            padding: 8px;
            background: #444;
            color: white;
            border: 1px solid #666;
            border-radius: 3px;
            cursor: pointer;
        }

        button:hover {
            background: #555;
        }

        button.active {
            background: #0066cc;
            border-color: #0088ff;
        }

        .time-control {
            margin-top: 10px;
        }

        label {
            display: block;
            margin: 10px 0 5px 0;
        }

        input[type="range"] {
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui">
        <h3>To Dust</h3>
        <p>Left Click: Gather material</p>
        <p>Right Click: Release material</p>
        <p>Mouse Wheel: Zoom</p>
        <p>Drag: Rotate planet</p>
    </div>

    <div id="controls">
        <h3>Material Selection</h3>
        <button id="water-btn" class="active">Water</button>
        <button id="soil-btn">Soil</button>
        <button id="lava-btn">Lava</button>
        
        <div class="time-control">
            <h3>Time Control</h3>
            <label>
                Speed: <span id="time-speed">1x</span>
                <input type="range" id="time-slider" min="0" max="4" value="2" step="1">
            </label>
        </div>

        <div style="margin-top: 10px; font-size: 12px;">
            <p>Temperature: <span id="temp-display">25°C</span></p>
            <p>Material: <span id="material-amount">0</span> units</p>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
