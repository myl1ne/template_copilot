<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivarium - Eternal Garden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #info-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            min-width: 200px;
            backdrop-filter: blur(10px);
        }
        #info-panel h2 {
            margin-bottom: 10px;
            font-size: 18px;
            color: #4CAF50;
        }
        #info-panel .stat {
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
        }
        #info-panel .stat-label {
            color: #aaa;
        }
        #info-panel .stat-value {
            color: #fff;
            font-weight: bold;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }
        #controls h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #4CAF50;
        }
        #controls p {
            font-size: 12px;
            margin: 3px 0;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="info-panel">
        <h2>Vivarium Stats</h2>
        <div class="stat">
            <span class="stat-label">Plants:</span>
            <span class="stat-value" id="plant-count">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Total Biomass:</span>
            <span class="stat-value" id="biomass">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Generation:</span>
            <span class="stat-value" id="generation">1</span>
        </div>
        <div class="stat">
            <span class="stat-label">Avg Fitness:</span>
            <span class="stat-value" id="fitness">0.00</span>
        </div>
        <div class="stat">
            <span class="stat-label">Time:</span>
            <span class="stat-value" id="time">0s</span>
        </div>
    </div>
    <div id="controls">
        <h3>Controls</h3>
        <p>🖱️ Left click + drag: Rotate view</p>
        <p>🖱️ Right click + drag: Pan view</p>
        <p>🖱️ Scroll: Zoom in/out</p>
        <p>⏸️ Space: Pause/Resume</p>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
