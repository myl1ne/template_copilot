<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Engine - Three.js Demo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            font-size: 14px;
            max-width: 300px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        #info-panel h2 {
            margin: 0 0 15px 0;
            font-size: 20px;
            color: #4ade80;
        }
        #info-panel .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        #info-panel .stat-label {
            color: #94a3b8;
        }
        #info-panel .stat-value {
            color: #4ade80;
            font-weight: bold;
        }
        .health-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .health-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80 0%, #22c55e 100%);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        .mana-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .mana-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #60a5fa 0%, #3b82f6 100%);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        #controls p {
            margin: 5px 0;
            font-size: 14px;
            color: #94a3b8;
        }
        .title {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .title h1 {
            margin: 0;
            font-size: 24px;
            color: #4ade80;
        }
        .title p {
            margin: 5px 0 0 0;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="title">
        <h1>⚔️ RPG Engine</h1>
        <p>Three.js Character Demo</p>
    </div>
    
    <div id="info-panel">
        <h2 id="character-name">Thorin the Brave</h2>
        
        <div class="health-bar">
            <div class="health-bar-fill" id="hp-bar" style="width: 100%">150 / 150</div>
        </div>
        
        <div class="mana-bar">
            <div class="mana-bar-fill" id="mana-bar" style="width: 100%">50 / 50</div>
        </div>
        
        <div class="stat-row">
            <span class="stat-label">STR</span>
            <span class="stat-value" id="str-value">18</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">DEX</span>
            <span class="stat-value" id="dex-value">12</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">CON</span>
            <span class="stat-value" id="con-value">16</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">INT</span>
            <span class="stat-value" id="int-value">8</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">WIZ</span>
            <span class="stat-value" id="wiz-value">10</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">CHA</span>
            <span class="stat-value" id="cha-value">14</span>
        </div>
        
        <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255, 255, 255, 0.2);">
            <div class="stat-row">
                <span class="stat-label">Armor</span>
                <span class="stat-value" id="armor-value">10</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Attack Speed</span>
                <span class="stat-value" id="speed-value">1.2</span>
            </div>
        </div>
    </div>
    
    <div id="controls">
        <p>🖱️ <strong>Mouse:</strong> Rotate Camera | 🎯 <strong>Space:</strong> Toggle Animation</p>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
