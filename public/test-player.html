<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Player Character</title>
    <style>
        body { 
            margin: 0; 
            font-family: Arial, sans-serif; 
            background: #1a1a2e;
            color: #fff;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 5px;
            z-index: 100;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        .status {
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>Player Character Test</h3>
        <div id="status" class="status">Loading...</div>
        <p>Controls:</p>
        <ul>
            <li>Left Mouse: Rotate camera</li>
            <li>Mouse Wheel: Zoom</li>
        </ul>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/examples/jsm/loaders/FBXLoader.js';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import * as SkeletonUtils from 'three/examples/jsm/utils/SkeletonUtils.js';
        import { FBXCharacterLoader } from './modules/FBXCharacterLoader.js';
        import { PlayerState } from './modules/PlayerState.js';

        const statusDiv = document.getElementById('status');

        // Setup scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 4);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1, 0);
        controls.update();
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);
        
        // Add a point light for better illumination
        const pointLight = new THREE.PointLight(0xffffff, 0.5);
        pointLight.position.set(-5, 5, 5);
        scene.add(pointLight);
        
        // Ground
        const groundGeometry = new THREE.PlaneGeometry(20, 20);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x2a2a3e,
            roughness: 0.8 
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Grid
        const gridHelper = new THREE.GridHelper(20, 20, 0x4a4a5e, 0x3a3a4e);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);
        
        // Load player
        async function init() {
            statusDiv.textContent = 'Loading character models...';
            
            const characterLoader = new FBXCharacterLoader();
            await characterLoader.loadAllCharacters((progress) => {
                statusDiv.textContent = `Loading characters... ${progress}%`;
            });
            
            statusDiv.textContent = 'Creating player character...';
            
            const playerState = new PlayerState(scene, characterLoader);
            const { player, characterGroup, equipmentVisuals } = playerState.createPlayer();
            
            // Position character
            characterGroup.position.set(0, 0, 0);
            
            statusDiv.innerHTML = `
                <strong style="color: #4ade80;">✓ Player loaded with Baelin model</strong><br>
                Equipment:<br>
                - Helmet: ${equipmentVisuals.helmet ? '✓' : '✗'}<br>
                - Sword: ${equipmentVisuals.sword ? '✓' : '✗'}<br>
                - Shield: ${equipmentVisuals.shield ? '✓' : '✗'}<br>
                <br>
                Model details:<br>
                - Children: ${characterGroup.children.length}<br>
                - Position: (${characterGroup.position.x}, ${characterGroup.position.y}, ${characterGroup.position.z})
            `;
            
            // Setup animation if available
            let mixer = null;
            characterGroup.traverse((child) => {
                if (child.isSkinnedMesh && child.skeleton) {
                    console.log('Found skinned mesh with skeleton');
                    // Try to find and play idle animation
                    if (characterLoader.getAnimation('baelin_idle')) {
                        mixer = new THREE.AnimationMixer(child.parent);
                        const action = mixer.clipAction(characterLoader.getAnimation('baelin_idle'));
                        action.play();
                        console.log('Playing idle animation');
                    }
                }
            });
            
            // Animation loop
            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const delta = clock.getDelta();
                
                if (mixer) {
                    mixer.update(delta);
                }
                
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
        }
        
        init().catch(error => {
            statusDiv.textContent = 'Error: ' + error.message;
            statusDiv.style.color = '#ef4444';
            console.error(error);
        });
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
