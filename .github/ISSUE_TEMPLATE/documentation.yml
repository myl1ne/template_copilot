name: Documentation Update
description: Suggest improvements to documentation
title: "[Docs]: "
labels: ["type: documentation", "priority: low"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve our documentation!
  
  - type: dropdown
    id: doc-type
    attributes:
      label: Documentation Type
      description: What type of documentation needs updating?
      options:
        - API Documentation
        - User Guide
        - Tutorial
        - README
        - Code Comments
        - Other
    validations:
      required: true
  
  - type: textarea
    id: issue
    attributes:
      label: What's Wrong or Missing?
      description: Describe what needs to be updated or added
      placeholder: Describe the documentation issue
    validations:
      required: true
  
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Where is this documentation located?
      placeholder: File path, URL, or section name
    validations:
      required: true
  
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How should we improve this documentation?
      placeholder: Describe your suggested changes
    validations:
      required: false
  
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context or examples
      placeholder: Any additional information
    validations:
      required: false
