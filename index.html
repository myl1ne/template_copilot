<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evo - Evolution Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #000;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
        }
        
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            max-width: 300px;
            z-index: 100;
        }
        
        #info h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #4CAF50;
        }
        
        #info .stat {
            margin: 5px 0;
        }
        
        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            z-index: 100;
        }
        
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px 0;
            border-radius: 3px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
        }
        
        button:hover {
            background: #45a049;
        }
        
        button:active {
            background: #3d8b40;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div id="info">
        <h2>Evo Simulator</h2>
        <div class="stat">Creatures: <span id="creatures">0</span></div>
        <div class="stat">Food Collected: <span id="foodCollected">0</span></div>
        <div class="stat">Time: <span id="time">0</span>s</div>
        <div class="stat">Best Fitness: <span id="fitness">0</span></div>
        <div class="stat">Births: <span id="births">0</span></div>
        <div class="stat">Deaths: <span id="deaths">0</span></div>
        <div class="stat">Species: <span id="species">0</span></div>
    </div>
    
    <div id="controls">
        <button id="resetBtn">Reset Simulation</button>
        <button id="spawnBtn">Spawn Creature</button>
        <button id="pauseBtn">Pause</button>
    </div>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
